<div class="slider-wrapper" tabindex="0">

  <!-- Navigation: Prev -->
  <button class="nav-btn nav-prev" (click)="prev()" aria-label="Previous">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M15 18l-6-6 6-6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- Cards track -->
  <div class="cards-track">
    <div
      *ngFor="let item of items; let i = index"
      class="slider-card"
      [class.state-active]="getCardState(i) === 'active'"
      [class.state-prev]="getCardState(i) === 'prev'"
      [class.state-next]="getCardState(i) === 'next'"
      [class.state-hidden]="getCardState(i) === 'hidden'"
      (click)="goTo(i)">

      <div class="card-image-wrap">
        <img [src]="item.imageUrl" [alt]="item.title" class="card-image" />
        <span class="card-category">{{ item.category }}</span>
      </div>

      <div class="card-body">
        <p class="card-group">{{ item.groupName }}</p>
        <h3 class="card-title">{{ item.title }}</h3>
        <div class="card-brand">
          <img *ngIf="item.brandLogoUrl" [src]="item.brandLogoUrl" [alt]="item.brandName" class="brand-logo" />
          <span class="brand-name">{{ item.brandName }}</span>
        </div>
      </div>

    </div>
  </div>

  <!-- Navigation: Next -->
  <button class="nav-btn nav-next" (click)="next()" aria-label="Next">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M9 18l6-6-6-6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

</div>
