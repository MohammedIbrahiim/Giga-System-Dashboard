<div class="dashboard">

  <!-- Stat Cards -->
  <div class="stats-row">
    <mat-card class="stat-card">
      <div class="stat-icon-wrap blue"><mat-icon>article</mat-icon></div>
      <div class="stat-info">
        <span class="stat-value">{{ stats().totalNews }}</span>
        <span class="stat-label">News Articles</span>
      </div>
    </mat-card>

    <mat-card class="stat-card">
      <div class="stat-icon-wrap green"><mat-icon>inventory_2</mat-icon></div>
      <div class="stat-info">
        <span class="stat-value">{{ stats().totalProducts }}</span>
        <span class="stat-label">Products</span>
      </div>
    </mat-card>

    <mat-card class="stat-card">
      <div class="stat-icon-wrap purple"><mat-icon>work</mat-icon></div>
      <div class="stat-info">
        <span class="stat-value">{{ stats().totalProjects }}</span>
        <span class="stat-label">Total Projects</span>
      </div>
    </mat-card>

    <mat-card class="stat-card">
      <div class="stat-icon-wrap orange"><mat-icon>pending_actions</mat-icon></div>
      <div class="stat-info">
        <span class="stat-value">{{ stats().activeProjects }}</span>
        <span class="stat-label">Active Projects</span>
      </div>
    </mat-card>
  </div>

<!-- Charts Row -->
<div class="charts-row">
  <!-- Full width chart -->
  <div class="chart-card full-width">
    <mat-card class="chart-card chart-wide">
      <mat-card-header>
        <mat-card-title>Quote Requests</mat-card-title>
        <mat-card-subtitle>By status</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-container">
          <canvas baseChart [type]="'bar'" [data]="quoteRequestsChartData" [options]="quoteRequestsChartOptions"></canvas>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
